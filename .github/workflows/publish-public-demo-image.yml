name: Publish public demo image

on:
  push:
    branches: [main]
    paths:
      - "public-demo/**"
      - "R/aoi_demo.R"
      - "R/face.R"
      - "demo/lisa1/**"
      - ".github/workflows/publish-public-demo-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: public-demo/Dockerfile
          push: true
          tags: ghcr.io/mjgreen/vorogaze-demo:${{ github.sha }}
          build-args: |
            RELEASE_COMMIT=${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
