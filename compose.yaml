services:
  vorogazeaoi:
    build:
      context: .
    image: vorogazeaoi:local
    container_name: vorogazeaoi
    restart: unless-stopped
    init: true
    environment:
      SHINY_HOST: 0.0.0.0
      SHINY_PORT: "3838"
    expose:
      - "3838"

  vorogazeaoi-auth-proxy:
    build:
      context: ./auth-proxy
    image: vorogazeaoi-auth-proxy:local
    container_name: vorogazeaoi-auth-proxy
    restart: unless-stopped
    init: true
    depends_on:
      - vorogazeaoi
    env_file:
      - ./funnel-proxy/auth.env
    environment:
      VOROGAZE_AUTH_PROXY_LISTEN: ":8088"
      VOROGAZE_UPSTREAM_URL: "http://vorogazeaoi:3838"
      VOROGAZE_COOKIE_SECURE: "true"
      VOROGAZE_SESSION_TTL_SECONDS: "43200"
    ports:
      - "127.0.0.1:8088:8088"
