services:
  vorogazeaoi:
    build:
      context: .
    image: vorogazeaoi:local
    container_name: vorogazeaoi
    restart: unless-stopped
    init: true
    environment:
      SHINY_HOST: 0.0.0.0
      SHINY_PORT: "3838"
    expose:
      - "3838"

  vorogazeaoi-auth-proxy:
    build:
      context: ./auth-proxy
    image: vorogazeaoi-auth-proxy:local
    container_name: vorogazeaoi-auth-proxy
    restart: unless-stopped
    init: true
    depends_on:
      - vorogazeaoi
    env_file:
      - /home/matt/.config/vorogazeaoi-beelink/auth.env
    environment:
      VOROGAZE_AUTH_PROXY_LISTEN: ":8088"
      VOROGAZE_BASE_PATH: "/vorogazeaoi"
      VOROGAZE_UPSTREAM_URL: "http://vorogazeaoi:3838"
      VOROGAZE_COOKIE_SECURE: "false"
      VOROGAZE_SESSION_TTL_SECONDS: "43200"
    expose:
      - "8088"
    networks:
      default:
      frontdoor:
        aliases:
          - vorogazeaoi-auth-proxy

networks:
  frontdoor:
    external: true
    name: beelink_frontdoor
