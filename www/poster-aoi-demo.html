<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VoroGaze AOI Demo</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
      color: #122329;
      background: #f5f7f8;
    }

    body {
      margin: 0;
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 22px 0 28px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: clamp(1.35rem, 2.8vw, 2.1rem);
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #465a61;
      font-size: 0.96rem;
    }

    video {
      display: block;
      width: 100%;
      margin: 18px 0 14px;
      border: 1px solid #d9e1e4;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 10px 28px rgba(18, 35, 41, 0.12);
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      font-size: 0.94rem;
    }

    a {
      color: #006f91;
      font-weight: 650;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>VoroGaze AOI Demo</h1>
    <p>A silent screencast showing landmark clicks, live Voronoi AOIs, and fixation-duration metrics.</p>
    <video controls autoplay muted loop playsinline preload="metadata">
      <source src="aoi-demo-screencast.mp4" type="video/mp4">
      Your browser does not support embedded video.
    </video>
    <nav aria-label="Related links">
      <a href="/">Open the live demo</a>
      <a href="https://github.com/mjgreen/vorogazeaoi3">GitHub repository</a>
      <a href="https://figshare.com/articles/dataset/Face_Research_Lab_London_Set/5047666">Face image provenance</a>
    </nav>
  </main>
</body>
</html>
